<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Still Life</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scene">
    <div class="wall"></div>
    <div class="table"></div>
    <div class="line"></div>

    <div class="plate"></div>

    <div class="orange orange1"></div>
    <div class="orange orange2"></div>
    <div class="orange orange3"></div>
    <div class="orange orange4"></div>

    <div class="dot dot1"></div>
    <div class="dot dot2"></div>

    <div class="melon melon1"></div>
    <div class="melon melon2"></div>

    <div class="lemonfruit"></div>

    <div class="lemon">
      <div class="lemon-bump left-bump"></div>
      <div class="lemon-bump right-bump"></div>
    </div>

    <div class="cup">
      <div class="cup-top"></div>
    </div>
  </div>
</body>
</html>
