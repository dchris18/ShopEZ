<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEZ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-header">
      <div class="header-row">
        <div class="icon-circle" aria-label="Profile">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4 20a8 8 0 0 1 16 0"></path>
          </svg>
        </div>
        <h1>ShopEZ</h1>
        <div class="icon-bell" aria-label="Notifications">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 4a4 4 0 0 0-4 4v2.2c0 1.4-.5 2.8-1.5 3.8L5 15.5h14L17.5 14c-1-1-1.5-2.4-1.5-3.8V8a4 4 0 0 0-4-4Z"></path>
            <path d="M10 18a2 2 0 0 0 4 0"></path>
          </svg>
        </div>
      </div>
    </header>

    <main class="content-area">
      <section class="cards-grid" aria-label="Top content cards">
        <article class="tile small-tile">
          <div></div>
        </article>
        <article class="tile small-tile">
          <div></div>
        </article>
        <article class="tile small-tile">
          <div></div>
        </article>
        <article class="tile small-tile">
          <div></div>
        </article>
      </section>

      <section class="featured-section" aria-label="Featured content">
        <article class="tile large-tile">
          <div></div>
        </article>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Bottom navigation">
      <div class="nav-track">
        <button type="button" aria-label="Search">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="11" cy="11" r="6"></circle>
            <path d="M16 16l4.5 4.5"></path>
          </svg>
        </button>
        <button type="button" aria-label="Filter">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M4 5h16l-6.5 7v5.5l-3 1.5V12L4 5Z"></path>
          </svg>
        </button>
        <button type="button" aria-label="Chat">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M4 6.5A3.5 3.5 0 0 1 7.5 3h9A3.5 3.5 0 0 1 20 6.5v6A3.5 3.5 0 0 1 16.5 16H10l-4.5 4v-4H7.5A3.5 3.5 0 0 1 4 12.5v-6Z"></path>
            <circle cx="10" cy="9.5" r="1"></circle>
            <circle cx="13" cy="9.5" r="1"></circle>
            <circle cx="16" cy="9.5" r="1"></circle>
          </svg>
        </button>
      </div>
    </nav>
  </div>
</body>
</html>
